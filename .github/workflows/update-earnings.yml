name: Update Earnings Calendar

# Runs once daily, before market open — earnings dates rarely change
# day-to-day (unlike prices), so this doesn't need the price sync's dense
# 30-min cadence. A single daily run keeps ticker_earnings fresh enough
# without adding meaningful GitHub Actions minutes usage.
#
# Runs ~480 sequential per-ticker requests (yfinance .calendar has no bulk
# equivalent to yf.download()), so this takes several minutes longer than
# the price sync — timeout is set generously to account for that.

on:
  schedule:
    - cron: '0 11 * * 1-5'   # ~7:00 AM EDT / 6:00 AM EST, weekdays
  workflow_dispatch:

jobs:
  update-earnings:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eagleview
      - run: pip install yfinance requests
      - name: Run earnings update
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_earnings.py
